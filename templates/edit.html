<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction — Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_edit.css') }}">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="/" class="sidebar-logo" title="Dashboard">
            <i class="bi bi-wallet2"></i>
        </a>
        <nav class="sidebar-nav">
            <a href="/?filter=all" title="Transactions"><i class="bi bi-arrow-left-right"></i></a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="edit-card">
            <h2><i class="bi bi-pencil-square"></i> Edit Transaction</h2>
            <form action="/edit/{{ expense.id }}" method="POST">

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" value="{{ expense.title }}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0" value="{{ expense.amount }}"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" value="{{ expense.date }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="Food" {{ 'selected' if expense.category=='Food' }}>🛒 Food</option>
                            <option value="Transport" {{ 'selected' if expense.category=='Transport' }}>🚌 Transport
                            </option>
                            <option value="Shopping" {{ 'selected' if expense.category=='Shopping' }}>🛍️ Shopping
                            </option>
                            <option value="Bills" {{ 'selected' if expense.category=='Bills' }}>🧾 Bills</option>
                            <option value="Entertainment" {{ 'selected' if expense.category=='Entertainment' }}>🎬
                                Entertainment</option>
                            <option value="Health" {{ 'selected' if expense.category=='Health' }}>💊 Health</option>
                            <option value="Education" {{ 'selected' if expense.category=='Education' }}>📚 Education
                            </option>
                            <option value="Salary" {{ 'selected' if expense.category=='Salary' }}>💼 Salary</option>
                            <option value="Freelance" {{ 'selected' if expense.category=='Freelance' }}>💻 Freelance
                            </option>
                            <option value="Investment" {{ 'selected' if expense.category=='Investment' }}>📈 Investment
                            </option>
                            <option value="Rent" {{ 'selected' if expense.category=='Rent' }}>🏠 Rent</option>
                            <option value="Other" {{ 'selected' if expense.category=='Other' }}>••• Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" name="type" required>
                            <option value="income" {{ 'selected' if expense.type=='income' }}>↑ Income</option>
                            <option value="expense" {{ 'selected' if expense.type=='expense' }}>↓ Expense</option>
                        </select>
                    </div>
                </div>

                <div class="btn-row">
                    <a href="/" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save Changes</button>
                </div>

            </form>
        </div>
    </main>

</body>

</html>
